# docker compose file for badapple2
name: badapple2
services:
  db:
    image: unmtransinfo/badapple:${IMAGE_TAG:-badapple2}
    env_file:
      - .env_BA2
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    environment:
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TZ}
    volumes:
      - postgres_data_BA2:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME} && test -f /var/lib/postgresql/restore_complete",
        ]
      interval: 60s
      timeout: 5s
      retries: 60

volumes:
  postgres_data_BA2:
