# docker compose file for badapple2
name: badapple2
services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DB_PORT=${DB_PORT}
        - DB_NAME=${DB_NAME}
        - DB_USER=${DB_USER}
        - DB_PASSWORD=${DB_PASSWORD}
        - TZ=${TZ}
        - PGDUMP_URL=${PGDUMP_URL}
    env_file:
      - .env_BA2
    ports:
      - "127.0.0.1:${DB_PORT}:${DB_PORT}"
    environment:
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - TZ=${TZ}
      - PGDUMP_URL=${PGDUMP_URL}
    volumes:
      - postgres_data_BA2:/var/lib/postgresql/data

volumes:
  postgres_data_BA2:
