# docker compose file for badapple_classic
name: badapple_classic
services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PGDUMP_URL=${PGDUMP_URL}
        - POSTGRES_DB=${DB_NAME}
    env_file:
      - .env_BA_classic
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    environment:
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=${TZ}
    volumes:
      - postgres_data_BA_classic:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME} && test -f /var/lib/postgresql/restore_complete",
        ]
      interval: 60s
      timeout: 5s
      retries: 60

volumes:
  postgres_data_BA_classic:
