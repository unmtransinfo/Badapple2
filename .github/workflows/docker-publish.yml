name: Build and Push Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - dockerfile_revised # temp for testing

env:
  IMAGE_NAME: unmtransinfo/badapple

jobs:
  # Build each platform on its native runner to avoid QEMU ELF compatibility issues.
  # Each job pushes by digest (no tag), and the merge job combines them into a
  # single multi-arch manifest.
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: badapple_classic
            db_name: badapple_classic
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple_classic.pgdump"
            platform: linux/amd64
            platform_short: amd64
            runner: ubuntu-latest
          - tag: badapple_classic-full
            db_name: badapple_classic
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple_classic_full.pgdump"
            platform: linux/amd64
            platform_short: amd64
            runner: ubuntu-latest
          - tag: badapple2
            db_name: badapple2
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple2.pgdump"
            platform: linux/amd64
            platform_short: amd64
            runner: ubuntu-latest
          - tag: badapple2-full
            db_name: badapple2
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple2_full.pgdump"
            platform: linux/amd64
            platform_short: amd64
            runner: ubuntu-latest
          - tag: badapple_classic
            db_name: badapple_classic
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple_classic.pgdump"
            platform: linux/arm64
            platform_short: arm64
            runner: ubuntu-24.04-arm
          - tag: badapple_classic-full
            db_name: badapple_classic
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple_classic_full.pgdump"
            platform: linux/arm64
            platform_short: arm64
            runner: ubuntu-24.04-arm
          - tag: badapple2
            db_name: badapple2
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple2.pgdump"
            platform: linux/arm64
            platform_short: arm64
            runner: ubuntu-24.04-arm
          - tag: badapple2-full
            db_name: badapple2
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple2_full.pgdump"
            platform: linux/arm64
            platform_short: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            PGDUMP_URL=${{ matrix.pgdump_url }}
            POSTGRES_DB=${{ matrix.db_name }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.tag }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.tag }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.tag }}-${{ matrix.platform_short }}
          path: /tmp/digests/${{ matrix.tag }}/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - tag: badapple_classic
          - tag: badapple_classic-full
          - tag: badapple2
          - tag: badapple2-full

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/${{ matrix.tag }}
          pattern: digests-${{ matrix.tag }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests/${{ matrix.tag }}
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:${{ matrix.tag }} \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ matrix.tag }}
