name: Build and Push Docker Images

on:
  workflow_dispatch:

env:
  IMAGE_NAME: unmtransinfo/badapple
push:
  branches:
    - dockerfile_revised # temp for testing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - tag: badapple_classic
            db_name: badapple_classic
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple_classic.pgdump"
          - tag: badapple_classic-full
            db_name: badapple_classic
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple_classic_full.pgdump"
          - tag: badapple2
            db_name: badapple2
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple2.pgdump"
          - tag: badapple2-full
            db_name: badapple2
            pgdump_url: "https://unmtid-dbs.net/download/Badapple2/badapple2_full.pgdump"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.tag }}
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PGDUMP_URL=${{ matrix.pgdump_url }}
            POSTGRES_DB=${{ matrix.db_name }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ matrix.tag }}

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }}:${{ matrix.tag }}"
